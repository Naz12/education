name: school_supervision_mobile
description: Mobile app for school clinical and administrative supervision.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  geolocator: ^13.0.1
  signature: ^5.5.0
  path_provider: ^2.1.4
  open_file: ^3.5.10
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
